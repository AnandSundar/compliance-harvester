# AWS Configuration for Compliance Harvester
# This file contains the AWS connection settings used by the CLI

# AWS Profile (from ~/.aws/credentials)
aws_profile: default

# AWS Region
aws_region: us-east-1

# Output directory for evidence package
output_directory: ./evidence-output

# Credential inactivity threshold in days
# Users with credentials unused for more than this will be flagged
inactive_credential_days: 90

# AWS Service endpoints (optional - defaults to standard AWS endpoints)
# Uncomment and modify if using custom endpoints
# endpoints:
#   s3: https://s3.amazonaws.com
#   iam: https://iam.amazonaws.com
#   cloudtrail: https://cloudtrail.amazonaws.com

# Timeout settings (seconds)
timeouts:
  connect: 30
  read: 60

# Logging configuration
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
